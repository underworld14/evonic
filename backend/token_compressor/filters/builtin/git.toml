# git.toml — RTK builtin filters for git commands.

# ---------------------------------------------------------------------------
# git status — strip boilerplate, keep only changed-files list
# ---------------------------------------------------------------------------
[[filter]]
command = "git status"
description = "Git status output"
strip_ansi = true
strip_lines = [
    "^On branch ",
    "^Your branch is ",
    "^nothing to commit",
    "^no changes added",
    '^\s*\(use "git ',
    '^\s*$',
]
match_output = [
    { pattern = '^nothing to commit, working tree clean\s*$', message = "Clean working tree" },
]
head_lines = 40

# ---------------------------------------------------------------------------
# git diff — strip headers, keep diff content
# ---------------------------------------------------------------------------
[[filter]]
command = "git diff(?! --staged)"
description = "Git diff output"
strip_ansi = true
strip_lines = [
    "^diff --git ",
    "^index ",
    "^--- ",
    '^\+\+\+ ',
    "^@@ ",
    '^\s*$',
]
keep_lines = [
    "^[+-]",
]
max_lines = 100
head_lines = 50
tail_lines = 50

# ---------------------------------------------------------------------------
# git diff --staged — same treatment as git diff
# ---------------------------------------------------------------------------
[[filter]]
command = "git diff --staged"
description = "Git diff --staged output"
strip_ansi = true
strip_lines = [
    "^diff --git ",
    "^index ",
    "^--- ",
    '^\+\+\+ ',
    "^@@ ",
    '^\s*$',
]
keep_lines = [
    "^[+-]",
]
max_lines = 100
head_lines = 50
tail_lines = 50

# ---------------------------------------------------------------------------
# git log — last 10 commits, skip merges, hash + subject only
# ---------------------------------------------------------------------------
[[filter]]
command = "git log"
description = "Git log output"
strip_ansi = true
replace = [
    { pattern = '^commit ([a-f0-9]{7})[a-f0-9]*', replacement = '\1' },
]
strip_lines = [
    "^Merge: ",
    "^Author: ",
    "^Date: ",
    '^\s*$',
]
tail_lines = 20
max_lines = 20

# ---------------------------------------------------------------------------
# git add — match success output
# ---------------------------------------------------------------------------
[[filter]]
command = "git add"
description = "Git add output"
strip_ansi = true
match_output = [
    { pattern = '.+', message = "Files staged" },
]
on_empty = "No files staged"

# ---------------------------------------------------------------------------
# git commit — keep only summary line
# ---------------------------------------------------------------------------
[[filter]]
command = "git commit"
description = "Git commit output"
strip_ansi = true
keep_lines = [
    '^\[',
]
match_output = [
    { pattern = 'nothing to commit', message = "Nothing to commit" },
]
on_empty = "Commit created"

# ---------------------------------------------------------------------------
# git push — strip progress noise, keep final summary
# ---------------------------------------------------------------------------
[[filter]]
command = "git push"
description = "Git push output"
strip_ansi = true
strip_lines = [
    "^Enumerating objects:",
    "^Counting objects:",
    "^Delta compression",
    "^Compressing objects:",
    "^Writing objects:",
    "^Total ",
    "^remote: ",
    "^To ",
    '^\s*$',
]
tail_lines = 3
on_empty = "Push complete"
