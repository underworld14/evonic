# system.toml — RTK builtin filters for common Unix/system commands.

# ---------------------------------------------------------------------------
# ls — just filenames, no noise
# ---------------------------------------------------------------------------
[[filter]]
command = "^ls(?! -la)"
description = "ls output"
strip_ansi = true
strip_lines = [
    '^\s*$',
]
max_lines = 50
on_empty = "Empty directory"

# ---------------------------------------------------------------------------
# ls -la — strip permissions/owner/group/date, keep size + filename
# ---------------------------------------------------------------------------
[[filter]]
command = "ls -la"
description = "ls -la output"
strip_ansi = true
replace = [
    { pattern = '^\S+\s+\d+\s+\S+\s+\S+\s+(\d+)\s+.+\s(.+)$', replacement = '\1 \2' },
]
strip_lines = [
    '^total ',
    '^\s*$',
]
max_lines = 50
on_empty = "Empty directory"

# ---------------------------------------------------------------------------
# cat — strip empty lines, cap line length
# ---------------------------------------------------------------------------
[[filter]]
command = "^cat "
description = "cat output"
strip_ansi = true
strip_lines = [
    '^\s*$',
]
truncate_lines_at = 200
max_lines = 200
head_lines = 100
tail_lines = 100
on_empty = "Empty file"

# ---------------------------------------------------------------------------
# grep / rg — strip filename prefixes, keep matches
# ---------------------------------------------------------------------------
[[filter]]
command = "^(grep|rg) "
description = "grep / ripgrep output"
strip_ansi = true
replace = [
    { pattern = '^[^:]+:(\d+:)?\s*', replacement = '' },
]
strip_lines = [
    '^\s*$',
]
max_lines = 50
head_lines = 25
tail_lines = 25
on_empty = "No matches"

# ---------------------------------------------------------------------------
# find — strip Permission denied noise, keep paths
# ---------------------------------------------------------------------------
[[filter]]
command = "^find "
description = "find output"
strip_ansi = true
strip_lines = [
    '^find: .*Permission denied',
    '^\s*$',
]
max_lines = 100
head_lines = 50
tail_lines = 50
on_empty = "No results"

# ---------------------------------------------------------------------------
# read / read_file — strip comments, blanks, trailing whitespace
# ---------------------------------------------------------------------------
[[filter]]
command = "^(read|read_file) "
description = "read / read_file output — language-aware comment stripping"
strip_ansi = true
strip_lines = [
    '^\d+:\s*$',
    '^\d+:\s*#[^!]',
    '^\d+:\s*#$',
    '^\d+:\s*//',
    '^\d+:\s*/\*',
    '^\d+:\s*\*\s',
    '^\d+:\s*\*@',
    '^\d+:\s*\*$',
    '^\d+:\s*\*/',
    '^\d+:\s*<!--',
    '^\d+:\s*-->',
]
replace = [
    { pattern = '\s+$', replacement = '' },
]
truncate_lines_at = 200
max_lines = 300
head_lines = 200
tail_lines = 100
on_empty = "Empty file"
