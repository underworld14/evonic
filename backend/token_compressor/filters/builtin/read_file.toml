[filter]
command = "^(read|read_file)\\b"
description = "read_file output — strip comments, blanks, trailing whitespace"
strip_ansi = true

# Lines matching ANY of these patterns are removed entirely.
# The read_file output format is "N: text" where N is the line number.
strip_lines = [
    # --- Blank / whitespace-only lines ---
    '^\\d+:\\s*$',

    # --- Python / TOML / YAML / Shell comments (# but NOT shebang #!) ---
    '^\\d+:\\s*#[^!]',
    '^\\d+:\\s*#$',

    # --- JS / TS / C / Java / Go / Rust line comments ---
    '^\\d+:\\s*//',

    # --- Block comment opening: /* ---
    '^\\d+:\\s*/\\*',

    # --- Block comment continuation lines (within /* ... */) ---
    '^\\d+:\\s*\\*\\s',
    '^\\d+:\\s*\\*@',
    '^\\d+:\\s*\\*$',
    '^\\d+:\\s*\\*/',

    # --- HTML comments ---
    '^\\d+:\\s*<!--',
    '^\\d+:\\s*-->',
]

# Strip trailing whitespace from each line (safety net; read_file already rstrip's)
replace = [
    { pattern = '\\s+$', replacement = '' },
]

truncate_lines_at = 200
max_lines = 300
head_lines = 200
tail_lines = 100
on_empty = "Empty file"
