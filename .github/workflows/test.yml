name: Tests

on:
  push:
    branches: [main, dev, experimental]
  pull_request:
    branches: [main, dev]

jobs:
  python-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest unit_tests/ -v

      - name: Run kanban plugin tests
        run: pytest plugins/kanban/tests/ -v

  go-tests:
    name: Go Tests (evonet)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.21
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: evonet/go.sum

      - name: Run Go tests
        working-directory: evonet
        run: go test ./...
